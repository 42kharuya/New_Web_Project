# Cloudflare Workers 設定

name = "job-hunt-tracker"
main = "worker.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# 非機密のランタイム変数（機密情報は Cloudflare ダッシュボードで設定）
